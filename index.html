  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #07070a;
      --card-dark: #0f0f15;
      --neon-blue: #6366f1;
      --success-green: #10B981;
      --text-white: #f5f6fa;
      
      --bg-light: #f6f8fc;
      --card-light: #ffffff;
      --accent-light: #4f46e5;
      --text-light: #0d0f14;
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      transition: background-color 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), color 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      -webkit-font-smoothing: antialiased;
    }
    
    .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }

    /* Theme Styles */
    body.dark { background-color: var(--bg-dark); color: var(--text-white); }
    body.light { background-color: var(--bg-light); color: var(--text-light); }

    .card-premium {
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    .dark .card-premium { 
      background-color: var(--card-dark); 
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.4);
    }
    .light .card-premium { 
      background-color: var(--card-light); 
      border: 1px solid rgba(28, 25, 23, 0.04); 
      box-shadow: 0 12px 36px -6px rgba(28, 25, 23, 0.03);
    }

    .card-premium:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px -8px rgba(99, 102, 241, 0.12);
    }

    .animate-orbit {
      animation: orbit 25s linear infinite;
    }
    
    @keyframes orbit {
      from { transform: rotate(0deg) translateX(100px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
    }

    .animate-pulse-slow {
      animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .85; transform: scale(1.015); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .dark ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 20px; }
    .light ::-webkit-scrollbar-thumb { background: #E7E5E4; border-radius: 20px; }

    /* Glassmorphism effects */
    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    
    .dark .glass { background: rgba(22, 22, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.02); }
    .light .glass { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(28, 25, 23, 0.04); }

    /* Bubble Animations */
    .message-bubble {
      transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .message-bubble:active {
      transform: scale(0.99);
    }
  </style>
